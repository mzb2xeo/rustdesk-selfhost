version: '3.8'

services:
  # ------------------------------------------------------------------------------
  # 1. RustDesk ID/Rendezvous Server (hbbs - Built from Fork)
  # ------------------------------------------------------------------------------
  hbbs:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: rustdesk-hbbs
    command: hbbs -r ${DOMAIN}:21117 -k _
    # Note: Environment variables MUST_LOGIN and RUSTDESK_API_JWT_KEY are only supported by the lejianwen fork and are omitted here.
    volumes:
      - ./data/server:/root
    ports:
      - "21115:21115"
      - "21116:21116"
      - "21116:21116/udp"
      - "21118:21118"  # Websocket ID port for Web Client
    networks:
      - rustdesk-net
    depends_on:
      - hbbr
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

  # ------------------------------------------------------------------------------
  # 2. RustDesk Relay Server (hbbr - Built from Fork)
  # ------------------------------------------------------------------------------
  hbbr:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: rustdesk-hbbr
    command: hbbr -k _
    volumes:
      - ./data/server:/root
    ports:
      - "21117:21117"
      - "21119:21119"  # Websocket Relay port for Web Client
    networks:
      - rustdesk-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

  # ------------------------------------------------------------------------------
  # 3. RustDesk API & Web Admin (Built from Local Source)
  # ------------------------------------------------------------------------------
  rustdesk-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rustdesk-api
    environment:
      - TZ=${TZ:-Asia/Ho_Chi_Minh}
      - RUSTDESK_API_LANG=vi
      - RUSTDESK_API_RUSTDESK_ID_SERVER=${DOMAIN}:21116
      - RUSTDESK_API_RUSTDESK_RELAY_SERVER=${DOMAIN}:21117
      - RUSTDESK_API_RUSTDESK_API_SERVER=https://${DOMAIN}
      - RUSTDESK_API_RUSTDESK_WS_HOST=wss://${DOMAIN}
      # Note: Read-only access to keys generated by hbbs to serve public keys to clients
      - RUSTDESK_API_RUSTDESK_KEY_FILE=/data/id_ed25519.pub
      - RUSTDESK_API_JWT_KEY=${JWT_SECRET}
    ports:
      - "21114:21114"
    volumes:
      - ./data/api:/app/data
      - ./data/server:/data:ro
    networks:
      - rustdesk-net
    depends_on:
      - hbbs
      - hbbr
    restart: unless-stopped

  # ------------------------------------------------------------------------------
  # 4. Nginx Reverse Proxy (Unified entrypoint for API and WebSockets)
  # ------------------------------------------------------------------------------
  reverse-proxy:
    image: nginx:alpine
    container_name: rustdesk-proxy
    ports:
      - "8082:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/logs/nginx:/var/log/nginx
    networks:
      - rustdesk-net
    depends_on:
      - rustdesk-api
      - hbbs
      - hbbr
    restart: unless-stopped

networks:
  rustdesk-net:
    name: rustdesk-net
    driver: bridge
